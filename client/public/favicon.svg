<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Gradient for Studia brand identity -->
    <linearGradient id="studia-neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <!-- Glow filter for modern web aesthetics -->
    <filter id="glow-effect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Glowing background ring -->
  <circle cx="256" cy="256" r="225" stroke="url(#studia-neon)" stroke-width="16" stroke-linecap="round" opacity="0.2" filter="url(#glow-effect)" />
  <circle cx="256" cy="256" r="225" stroke="url(#studia-neon)" stroke-width="6" stroke-dasharray="12 16" />

  <!-- Graduation Cap (floating above open book) -->
  <g filter="url(#glow-effect)">
    <!-- Cap Diamond Top -->
    <path d="M256 100 L410 165 L256 230 L102 165 Z" fill="url(#studia-neon)" />
    
    <!-- Cap Base / Neck -->
    <path d="M176 198 V230 C176 265, 336 265, 336 230 V198" stroke="url(#studia-neon)" stroke-width="12" stroke-linecap="round" fill="none" />
    
    <!-- Tassel -->
    <path d="M256 165 L370 205 V260" stroke="#f4f2f9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <circle cx="370" cy="265" r="10" fill="#f4f2f9" />
    
    <!-- Open Book Base -->
    <!-- Left Page -->
    <path d="M140 310 C200 270, 240 310, 256 320 V380 C240 370, 200 330, 140 370 Z" fill="url(#studia-neon)" opacity="0.85" />
    <!-- Right Page -->
    <path d="M372 310 C312 270, 272 310, 256 320 V380 C272 370, 312 330, 372 370 Z" fill="url(#studia-neon)" opacity="0.85" />
  </g>
</svg>